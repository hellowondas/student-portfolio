<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Portfolio of Samuel Shielu, a frontend developer and software engineering student showcasing projects and academic work.">
  <title>Planner | Portfolio</title>
  
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/boxicons@2.0.5/css/boxicons.min.css">
</head>
<body>
  <div id="header-container"></div>
  <script>
    //For Header
    fetch('./assets/header.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('header-container').innerHTML = data;
      });
  </script>
  
  <main id="main">
    <section class="ss_work">
      <div class="container">
        <h1>Daily Planner</h1>
        <p>Capture tasks, tick them off, keep momentum. Everything is saved on your device. </p>
      </div>
    </section>

    <section class="sect">
      <div class="container">
        <div class="planner_card">

          <form class="planner_form" id="planner-form" novalidate>
            
            <label for="task-input"class="visually-hidden">new task</label>
            <input
              type="text"
              id="task-input"
              class="input"
              placeholder="Add a new task here."
              autocomplete="off"
              maxlength="140"
              required
            >
            <button  type="submit" class="button">
              <i class="bx bx-plus" aria-hidden="true"></i>
              <span>Add Task</span>
            </button>
          </form>

          <div class="planner_toolbar" aria-label="tab buttons">
            <button class="chip is-active" role="tab" aria-pressed="true" data-filter="all">All</button>
            <button class="chip" role="tab" aria-pressed="false" data-filter="active">Active</button>
            <button class="chip" role="tab" aria-pressed="false"  data-filter="completed">Completed</button>
          </div>

          <ul class="task_list" id="task-list" aria-live="polite" aria-label="current tasks"></ul>
          <p class="empty_state" id="empty-state" hidden>
            No task. Add one</p>

          <div class="planner_footer" >
            <span id="task-count" class="mono">0 tasks</span>
            <button type="button" class="clr_btn" id="clear-completed">Clear completed</button>
          </div>
        </div>
      </div>
    </section>

  </main>
  
  
  
  
  
  <div id="footer-container"></div>
  <script>
    // For Footer
    fetch('./assets/footer.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('footer-container').innerHTML = data;
        /* call function from main.js after header loads */
        initApp();
      });
  </script>
  <script src="./assets/main.js"></script>
  <script src="./assets/planner.js"></script>
</body>
</html>
